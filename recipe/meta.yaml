{% set name = "covalent" %}
{% set version = "0.240.0" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/covalent-{{ version }}.tar.gz
  sha256: 3252ffcbffd13403c4678f45e97f0db3557861a8fb4a5727d55b3c92e33c5407

build:
  entry_points:
    - covalent = covalent_dispatcher._cli.cli:cli
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 0

requirements:
  host:
    - python {{ python_min }}
    - pip
    - setuptools
  run:
    - python >={{ python_min }}
    - aiofiles >=0.8.0
    - aiohttp >=3.8.1
    - alembic >=1.8.0
    - boto3 >=1.26.110
    - click >=8.1.3
    - cloudpickle >=2.0.0
    - dask-core >=2022.6.0
    - distributed
    - fastapi >=0.100.0
    - filelock >=3.12.2
    - furl >=2.1.3
    - lmdbm >=0.0.5
    - mpire >=2.7.1
    - natsort >=8.4.0
    - networkx >=2.8.6
    - orjson >=3.8.10
    - pennylane >=0.31.1,<0.33.0
    - psutil >=5.9.0
    - pydantic >=2.1.1
    - python-multipart >=0.0.6
    - python-socketio >=5.7.1
    - requests >=2.24.0
    - rich >=12.0.0
    - simplejson >=3.17.6
    - sqlalchemy >=1.4.37,<2.0.0
    - sqlalchemy-utils >=0.38.3
    - toml >=0.10.2
    - typing-extensions >=4.8.0
    - uvicorn
    - watchdog >=2.2.1
    - werkzeug >=2.0.3
    - pybind11

test:
  imports:
    - covalent
    - covalent_dispatcher
    - covalent_migrations
    - covalent_ui
  commands:
    - pip check
    - covalent --help
  requires:
    - pip
    - python {{ python_min }}

about:
  home: https://github.com/AgnostiqHQ/covalent
  summary: Covalent Workflow Tool
  license: AGPL-3.0-only
  license_file: LICENSE

extra:
  recipe-maintainers:
    - jan-janssen
